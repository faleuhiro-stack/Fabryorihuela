<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner PRO Fabry</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  background:#050507;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:20px;
}

h1{color:#e11d2e;}

#reader{
  width:260px;
  margin:20px auto;
  border-radius:20px;
  overflow:hidden;
  border:2px solid rgba(255,255,255,.2);
  box-shadow:0 0 20px rgba(255,0,0,.4);
}

input,button{
  width:90%;
  max-width:320px;
  padding:14px;
  margin:8px auto;
  border-radius:12px;
  border:none;
  display:block;
  font-size:16px;
}

button{
  background:#e11d2e;
  color:white;
  font-weight:bold;
}

/* 🔥 MENSAJE CENTRAL */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
  font-weight:900;
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:999;
}

.overlay.ok{
  background:rgba(0,150,0,.85);
}

.overlay.bad{
  background:rgba(150,0,0,.85);
}

.overlay.show{
  opacity:1;
}
</style>
</head>

<body>

<h1>🎟 Scanner PRO</h1>

<input id="pin" type="password" placeholder="PIN staff">

<div id="reader"></div>

<button onclick="startScanner()">Activar cámara</button>

<input id="manualCode" placeholder="FABRY-0001">
<button onclick="checkManual()">Validar manual</button>

<div id="overlay" class="overlay"></div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwG1-39WhJ9VG2wjmRG8t_zt2OD1CBZE9eGJFtnx9d7f3kqMPK7_2dAQTJw-2ktBzxF/exec";

let html5QrCode;
let locked = false;

function feedback(ok){
  if(navigator.vibrate){
    navigator.vibrate(ok ? [120,60,120] : [300]);
  }

  const audio = new Audio(ok
    ? "https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"
    : "https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
  );
  audio.play().catch(()=>{});
}

function showOverlay(text, ok){
  const overlay = document.getElementById("overlay");

  overlay.className = "overlay show " + (ok ? "ok" : "bad");
  overlay.innerHTML = ok ? "✅ APROBADO" : "❌ RECHAZADO";

  setTimeout(()=>{
    overlay.className = "overlay";
    locked = false;
  }, 2000);
}

function callApi(code){
  if(locked) return;

  const pin = document.getElementById("pin").value.trim();

  if(!pin){
    alert("Ingresa PIN");
    return;
  }

  locked = true;

  const callbackName = "cb_" + Date.now();

  window[callbackName] = function(data){
    feedback(data.ok);
    showOverlay(data.status, data.ok);
    delete window[callbackName];
  };

  const script = document.createElement("script");
  script.src = WEB_APP_URL +
    "?pin=" + encodeURIComponent(pin) +
    "&code=" + encodeURIComponent(code) +
    "&callback=" + callbackName;

  script.onerror = function(){
    showOverlay("ERROR", false);
    locked = false;
  };

  document.body.appendChild(script);
}

function checkManual(){
  const code = document.getElementById("manualCode").value.trim();
  callApi(code);
}

function onScanSuccess(text){
  callApi(text);
}

function startScanner(){
  if(!html5QrCode){
    html5QrCode = new Html5Qrcode("reader");
  }

  Html5Qrcode.getCameras().then(cameras => {
    const cameraId = cameras[cameras.length - 1].id;

    html5QrCode.start(
      cameraId,
      { fps: 10, qrbox: 200 },
      onScanSuccess
    );
  });
}
</script>

</body>
</html>
