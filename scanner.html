<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner PRO | Fabry</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  background:#050507;
  color:white;
  font-family:Arial,sans-serif;
  text-align:center;
  padding:18px;
}
h1{color:#e11d2e;font-size:38px;}
input,button{
  width:100%;
  max-width:420px;
  padding:16px;
  margin:10px auto;
  border-radius:14px;
  border:none;
  font-size:18px;
  display:block;
}
button{
  background:#e11d2e;
  color:white;
  font-weight:900;
}
.scanner-wrap{
  max-width:420px;
  margin:20px auto;
  border-radius:22px;
  overflow:hidden;
  border:2px solid rgba(255,255,255,.2);
  box-shadow:0 0 35px rgba(255,0,0,.35);
}
#reader{
  width:100%;
  min-height:320px;
  background:#000;
}
.result{
  max-width:420px;
  margin:18px auto;
  padding:22px;
  border-radius:18px;
  font-size:24px;
  font-weight:900;
}
.ok{background:#008f3a;box-shadow:0 0 35px rgba(0,255,100,.75);}
.bad{background:#a00018;box-shadow:0 0 35px rgba(255,0,0,.75);}
.info{background:#222;}
.small{color:#aaa;font-size:14px;}
</style>
</head>

<body>

<h1>🎟 Scanner PRO</h1>
<p class="small">Check-in Fabry Noche Bohemia</p>

<input id="pin" type="password" placeholder="PIN de staff">

<div class="scanner-wrap">
  <div id="reader"></div>
</div>

<button onclick="startScanner()">📷 Activar cámara</button>

<input id="manualCode" placeholder="Código manual: FABRY-0001">
<button onclick="checkManual()">Validar manual</button>

<div id="result" class="result info">Esperando lectura...</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwmVWDGETWu5khZTT7EevSevm5jXZy3Ape9d-f5uQGfzniW9AK8inenlPG1GorbgEHD/exec";

let html5QrCode;
let locked = false;

function normalizeCode(text){
  text = String(text || "").trim().toUpperCase();

  const match = text.match(/FABRY-\d{4,6}/);
  if(match) return match[0];

  return text;
}

function showResult(data){
  const box = document.getElementById("result");

  if(data.ok){
    if(navigator.vibrate) navigator.vibrate([120,60,120]);
    box.className = "result ok";
    box.innerHTML = "✅ " + data.status + "<br>" + data.code;
  }else{
    if(navigator.vibrate) navigator.vibrate([300]);
    box.className = "result bad";
    box.innerHTML = "❌ " + data.status + "<br>" + (data.code || "");
  }

  setTimeout(()=>{ locked = false; }, 2500);
}

function callApi(code){
  if(locked) return;

  const pin = document.getElementById("pin").value.trim();
  const box = document.getElementById("result");

  code = normalizeCode(code);

  if(!pin){
    alert("Escribe el PIN primero");
    return;
  }

  if(!code){
    alert("Código vacío");
    return;
  }

  locked = true;
  box.className = "result info";
  box.innerHTML = "⏳ Validando " + code + "...";

  const callbackName = "cb_" + Date.now();

  window[callbackName] = function(data){
    showResult(data);
    delete window[callbackName];
  };

  const script = document.createElement("script");
  script.src = WEB_APP_URL +
    "?pin=" + encodeURIComponent(pin) +
    "&code=" + encodeURIComponent(code) +
    "&callback=" + callbackName;

  script.onerror = function(){
    box.className = "result bad";
    box.innerHTML = "❌ Error conectando con Apps Script";
    locked = false;
  };

  document.body.appendChild(script);
}

function checkManual(){
  const code = document.getElementById("manualCode").value.trim();
  callApi(code);
}

function onScanSuccess(decodedText){
  callApi(decodedText);
}

function startScanner(){
  if(!html5QrCode){
    html5QrCode = new Html5Qrcode("reader");
  }

  Html5Qrcode.getCameras().then(cameras => {
    if(!cameras || cameras.length === 0){
      document.getElementById("result").className = "result bad";
      document.getElementById("result").innerHTML = "❌ No se encontró cámara";
      return;
    }

    const cameraId = cameras[cameras.length - 1].id;

    html5QrCode.start(
      cameraId,
      {
        fps: 10,
        qrbox: { width: 240, height: 240 }
      },
      onScanSuccess
    );
  }).catch(err => {
    document.getElementById("result").className = "result bad";
    document.getElementById("result").innerHTML = "❌ Permiso de cámara denegado";
  });
}
</script>

</body>
</html>
