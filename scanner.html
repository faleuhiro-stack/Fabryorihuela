<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwmVWDGETWu5khZTT7EevSevm5jXZy3Ape9d-f5uQGfzniW9AK8inenlPG1GorbgEHD/exec";

let locked = false;

function callApi(code){
  if(locked) return;

  const pinInput = document.getElementById("pin");
  const resultBox = document.getElementById("result");

  const pin = pinInput ? pinInput.value.trim() : "1234";

  if(!pin){
    alert("Escribe el PIN primero");
    return;
  }

  if(!code){
    alert("Código vacío");
    return;
  }

  locked = true;
  resultBox.className = "result";
  resultBox.innerHTML = "⏳ Validando...";

  const callbackName = "cb_" + Date.now();

  window[callbackName] = function(data){
    showResult(data);
    delete window[callbackName];
    locked = false;
  };

  const script = document.createElement("script");
  script.src =
    WEB_APP_URL +
    "?pin=" + encodeURIComponent(pin) +
    "&code=" + encodeURIComponent(code) +
    "&callback=" + callbackName;

  script.onerror = function(){
    resultBox.className = "result bad";
    resultBox.innerHTML = "❌ Error conectando con Apps Script";
    locked = false;
  };

  document.body.appendChild(script);
}

function showResult(data){
  const box = document.getElementById("result");

  if(data.ok){
    if(navigator.vibrate) navigator.vibrate([120,60,120]);
    box.className = "result ok";
    box.innerHTML = "✅ " + data.status + "<br>" + data.code;
  }else{
    if(navigator.vibrate) navigator.vibrate([300]);
    box.className = "result bad";
    box.innerHTML = "❌ " + data.status + "<br>" + (data.code || "");
  }
}

function checkManual(){
  const input = document.getElementById("manualCode");
  const code = input.value.trim().toUpperCase();

  callApi(code);
}

function onScanSuccess(decodedText){
  callApi(decodedText.trim().toUpperCase());
}

new Html5QrcodeScanner("reader", {
  fps: 10,
  qrbox: 230,
  rememberLastUsedCamera: true
}).render(onScanSuccess);
</script>
